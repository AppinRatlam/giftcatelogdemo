<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gift Toy Stationery World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#f4f4f4;transition:.3s}

/* DARK MODE */
body.dark{background:#111;color:#eee}
body.dark .card{background:#1e1e1e}
body.dark .topbar{background:#1c1c1c}
body.dark .modal-content{background:#1e1e1e;color:white}

/* HERO */
.hero{padding:60px 20px;text-align:center;color:white;background:linear-gradient(135deg,#ff4d4d,#ff9a9e)}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:white;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.search input{padding:8px 15px;border-radius:20px;border:1px solid #ccc}

/* BUTTONS */
.section-bar,.category-bar{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:20px}
.section-bar button{padding:8px 16px;border:none;background:#ff4d4d;color:white;border-radius:20px;cursor:pointer}
.category-bar button{padding:6px 14px;border:none;background:#eee;border-radius:20px;cursor:pointer}
.category-bar button.active{background:#ff4d4d;color:white}

/* GRID */
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;padding:20px 40px}
@media(max-width:768px){.products{grid-template-columns:1fr;}}

/* CARD */
.card{background:white;border-radius:12px;box-shadow:0 6px 15px rgba(0,0,0,.1);overflow:hidden}
.card img{width:100%;height:240px;object-fit:contain;background:white;padding:15px;cursor:pointer;transition:.3s}
.card img:hover{transform:scale(1.05)}
.card-content{padding:15px}
.description{font-size:13px;color:#666;margin:6px 0}
.price{font-weight:600;color:#ff4d4d;margin-bottom:6px}
.carton-info{font-size:12px;color:gray;margin-bottom:6px}
select{width:100%;padding:6px;margin-bottom:10px;border-radius:5px;border:1px solid #ccc}
.actions{display:flex;justify-content:space-between;margin-top:10px}
.actions button{padding:6px 10px;border:none;border-radius:5px;cursor:pointer}
.add-btn{background:#ff4d4d;color:white}
.view-btn{background:#111;color:white}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);justify-content:center;align-items:center}
.modal-content{background:white;padding:20px;border-radius:10px;width:90%;max-width:500px}
.modal img{width:100%;height:260px;object-fit:contain}

/* FULLSCREEN VIEWER */
.viewer{display:none;position:fixed;inset:0;background:black;justify-content:center;align-items:center}
.viewer img{max-width:90%;max-height:90%}
.close-btn{position:absolute;top:20px;right:30px;color:white;font-size:25px;cursor:pointer}
</style>
</head>

<body>

<div class="hero">
<h1>AL Impax</h1>
<p>Wholesale Best Price Gurantee</p>
</div>

<div class="topbar">
<div class="search">
<input type="text" placeholder="Search..." onkeyup="searchProducts(this.value)">
</div>
<div>
🛒 Cart: <span id="cartCount">0</span>
<button onclick="toggleDark()">🌙</button>
</div>
</div>

<div class="section-bar">
<button onclick="showSection('Gifts')">Gifts</button>
<button onclick="showSection('Toys')">Toys</button>
<button onclick="showSection('Stationery')">Stationery</button>
</div>

<div class="category-bar" id="categoryBar"></div>
<div class="products" id="productContainer"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<div style="text-align:right;cursor:pointer" onclick="closeModal()">X</div>
<img id="modalImg">
<h3 id="modalTitle"></h3>
<p id="modalDesc"></p>
<p id="modalPrice" class="price"></p>
<button onclick="sendWhatsApp()">📱 WhatsApp Inquiry</button>
</div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
<span class="close-btn" onclick="closeViewer()">X</span>
<img id="viewerImg">
</div>

<script>

const categories={
Gifts:["Birthday","Anniversary","Love","Corporate","Kids","Festival","Premium","Custom","Couple","Decor"],
Toys:["RC","Soft","Educational","Outdoor","Battery","Dolls","Cars","Blocks","Animals","Games"],
Stationery:["Compass","Pencil Box","Lunchbox","Diary","Balloon","Birthday Item","Pouch","Marker","Bottle","Accessories"]
};


const stationeryProducts=[

{ name:"Password Compass 250", category:"Compass", image:"password-compass.jpg", description:"Premium quality compass set", price:250, cartonRate:220, cartonQty:2000 },

{ name:"Pencil Box 35305", category:"Pencil Box", image:"pencil-box-35305.jpg", description:"Durable pencil box", price:220, cartonRate:198, cartonQty:1000 },

{ name:"GBT 4188", category:"Compass", image:"gbt-4188.jpg", description:"Student compass set", price:60, cartonRate:52, cartonQty:1500 },

{ name:"HBC 188534", category:"Compass", image:"hbc-188534.jpg", description:"Metal compass set", price:115, cartonRate:105, cartonQty:550 },

{ name:"Caesar Compass", category:"Compass", image:"caesar-compass.jpg", description:"Premium drawing compass", price:180, cartonRate:162, cartonQty:150 },

{ name:"LP Y 6675", category:"Compass", image:"lpy-6675.jpg", description:"School geometry compass", price:165, cartonRate:150, cartonQty:600 },

{ name:"7205 Plastic Lunchbox", category:"Lunchbox", image:"7205-lunchbox.jpg", description:"Plastic lunch box", price:160, cartonRate:148, cartonQty:250 },

{ name:"26312 Ride With Dipi", category:"Lunchbox", image:"26312-dipi.jpg", description:"Cartoon printed lunchbox", price:210, cartonRate:190, cartonQty:500 },

{ name:"70903 Plastic Lunchbox", category:"Lunchbox", image:"70903-lunchbox.jpg", description:"Kids lunch box", price:190, cartonRate:160, cartonQty:250 },

{ name:"7106SSML Lunchbox", category:"Lunchbox", image:"7106ssml.jpg", description:"Steel lunch box", price:420, cartonRate:190, cartonQty:150 },

{ name:"General Diary", category:"Diary", image:"general-diary.jpg", description:"Standard office diary", price:90, cartonRate:78, cartonQty:200 },

{ name:"Agent Diary", category:"Diary", image:"agent-diary.jpg", description:"Professional diary", price:90, cartonRate:78, cartonQty:200 },

{ name:"Princess Diary", category:"Diary", image:"princess-diary.jpg", description:"Kids printed diary", price:55, cartonRate:48, cartonQty:200 },

{ name:"I Love You Foil Balloon", category:"Balloon", image:"iloveyou-balloon.jpg", description:"Decorative foil balloon", price:75, cartonRate:65, cartonQty:300 },

{ name:"Happy Anniversary File Balloon", category:"Birthday Item", image:"anniversary-balloon.jpg", description:"Birthday decoration balloon", price:80, cartonRate:70, cartonQty:200 },

{ name:"Mi Five Piece File Balloon", category:"Birthday Item", image:"mi-five-balloon.jpg", description:"Balloon decoration set", price:75, cartonRate:60, cartonQty:300 },

{ name:"Pouch 6862", category:"Pouch", image:"pouch-6862.jpg", description:"Premium zipper pouch", price:150, cartonRate:140, cartonQty:200 },

{ name:"Pouch 7092", category:"Pouch", image:"pouch-7092.jpg", description:"School pouch", price:200, cartonRate:180, cartonQty:200 },

{ name:"Acrylic Marker", category:"Marker", image:"acrylic-marker.jpg", description:"High quality acrylic marker", price:80, cartonRate:72, cartonQty:200 },

{ name:"Acrylic Marker Holen Holen", category:"Marker", image:"acrylic-holen.jpg", description:"Color marker set", price:80, cartonRate:70, cartonQty:200 },

{ name:"China Double Side Marker", category:"Marker", image:"china-marker.jpg", description:"Double sided marker", price:75, cartonRate:68, cartonQty:200 },

{ name:"Bus Water Bottle", category:"Bottle", image:"bus-bottle.jpg", description:"Kids bus design bottle", price:180, cartonRate:150, cartonQty:200 },

{ name:"911008 Bottle", category:"Bottle", image:"911008-bottle.jpg", description:"Premium plastic bottle", price:220, cartonRate:200, cartonQty:300 },

{ name:"P Bottle 3080", category:"Bottle", image:"p-bottle-3080.jpg", description:"School water bottle", price:130, cartonRate:120, cartonQty:200 }

];
let cart=0;
let selectedProduct="";
let selectedTotal=0;

const container=document.getElementById("productContainer");
const categoryBar=document.getElementById("categoryBar");

function showSection(section){
container.innerHTML="";
categoryBar.innerHTML="";

categories[section].forEach(cat=>{
let btn=document.createElement("button");
btn.innerText=cat;
btn.onclick=function(){filterCategory(cat,this)};
categoryBar.appendChild(btn);
});

if(section!=="Stationery"){
for(let i=1;i<=20;i++){
let cat=categories[section][i%10];
container.innerHTML+=`
<div class="card" data-category="${cat}">
<img src="https://picsum.photos/400/300?random=${section+i}" onclick="openViewer(this.src)">
<div class="card-content">
<h3>${section} Product ${i}</h3>
<p class="price">₹ ${100+i*10}</p>
</div>
</div>`;
}
return;
}

stationeryProducts.forEach(product=>{
container.innerHTML+=`
<div class="card" data-category="${product.category}">
<img src="${product.image}" onclick="openViewer(this.src)">
<div class="card-content">
<h3>${product.name}</h3>
<p class="description">${product.description}</p>

<select onchange="updatePrice(this,${product.price},${product.cartonRate},${product.cartonQty})">
<option value="1">1 Piece</option>
<option value="10">10 Pieces</option>
<option value="carton">Carton (${product.cartonQty})</option>
</select>

<p class="carton-info"></p>
<p class="price">₹ ${product.price}</p>

<div class="actions">
<button class="add-btn" onclick="addToCart()">Add</button>
<button class="view-btn" onclick="openModal(this)">View</button>
</div>

</div>
</div>`;
});
}

function filterCategory(category,btn){
document.querySelectorAll(".category-bar button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

document.querySelectorAll(".card").forEach(card=>{
if(card.dataset.category===category){
card.style.display="block";
}else{
card.style.display="none";
}
});
}

function updatePrice(select,basePrice,cartonRate,cartonQty){
let card=select.closest(".card");
let priceElement=card.querySelector(".price");
let cartonInfo=card.querySelector(".carton-info");

if(select.value==="1"){
selectedTotal=basePrice;
cartonInfo.innerText="";
}
else if(select.value==="10"){
selectedTotal=basePrice*10;
cartonInfo.innerText="";
}
else{
selectedTotal=cartonRate*cartonQty;
cartonInfo.innerText="Carton contains "+cartonQty+" pcs | Per piece ₹ "+cartonRate;
}
priceElement.innerText="₹ "+selectedTotal;
}

function addToCart(){cart++;document.getElementById("cartCount").innerText=cart;}
function openModal(btn){
let card=btn.closest(".card");
selectedProduct=card.querySelector("h3").innerText;
document.getElementById("modalImg").src=card.querySelector("img").src;
document.getElementById("modalTitle").innerText=selectedProduct;
document.getElementById("modalDesc").innerText=card.querySelector(".description")?.innerText||"";
document.getElementById("modalPrice").innerText="₹ "+selectedTotal;
document.getElementById("modal").style.display="flex";
}
function closeModal(){document.getElementById("modal").style.display="none";}
function openViewer(src){document.getElementById("viewerImg").src=src;document.getElementById("viewer").style.display="flex";}
function closeViewer(){document.getElementById("viewer").style.display="none";}
function toggleDark(){document.body.classList.toggle("dark");localStorage.setItem("theme",document.body.classList.contains("dark")?"dark":"light");}
window.onload=function(){if(localStorage.getItem("theme")==="dark"){document.body.classList.add("dark");}showSection("Gifts");}
function searchProducts(keyword){
keyword=keyword.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
let title=card.querySelector("h3").innerText.toLowerCase();
card.style.display=title.includes(keyword)?"block":"none";
});
}
function sendWhatsApp(){
let phone="917777880222";
let message=`Hello, I am interested in ${selectedProduct} - ₹ ${selectedTotal}`;
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`,'_blank');
}
</script>

</body>
</html>
